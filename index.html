<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>West Texas v3</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); z-index: 10; cursor: pointer;
}
#overlay div {
  color: #e8d5b0; font-family: Georgia, serif; text-align: center;
  font-size: 22px; line-height: 1.8;
}
#overlay div span { font-size: 14px; color: #c0a878; display: block; margin-top: 4px; }
#crosshair {
  position: fixed; top: 50%; left: 50%;
  width: 4px; height: 4px; margin: -2px 0 0 -2px;
  background: rgba(255,255,255,0.3); border-radius: 50%;
  pointer-events: none; z-index: 5; display: none;
}
#time-buttons {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: none; z-index: 5; gap: 8px; font-family: Georgia, serif;
}
#time-buttons button {
  background: rgba(0,0,0,0.5); color: #e8d5b0; border: 1px solid rgba(232,213,176,0.3);
  padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 4px;
  font-family: Georgia, serif; transition: background 0.2s;
}
#time-buttons button:hover { background: rgba(60,40,20,0.7); }
#time-buttons button.active { background: rgba(120,80,30,0.7); border-color: #e8d5b0; }
#hud {
  position: fixed; bottom: 20px; left: 20px;
  color: rgba(232,213,176,0.6); font: 13px Georgia, serif;
  pointer-events: none; z-index: 5; display: none; line-height: 1.6;
}
#compass-wrap {
  position: fixed; top: 20px; right: 20px;
  width: 50px; height: 50px; display: none; z-index: 5; pointer-events: none;
}
#compass-wrap canvas { width: 100%; height: 100%; }
#minimap {
  position: fixed; bottom: 70px; right: 15px;
  width: 160px; height: 160px; display: none; z-index: 5; pointer-events: none;
  border: 1px solid rgba(232,213,176,0.25); border-radius: 6px;
  background: rgba(0,0,0,0.35); overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="overlay" onclick="startGame()">
  <div>
    West Texas <small style="font-size:14px;opacity:0.6">v3 — flat toroidal</small>
    <span>Click to enter<br>W/S — forward/back &nbsp; A/D — turn<br>Mouse — look around &nbsp; Shift — run &nbsp; +/- — time</span>
  </div>
</div>
<div id="crosshair"></div>
<div id="time-buttons">
  <button onclick="setTime('morning')" data-time="morning">Morning</button>
  <button onclick="setTime('midday')" data-time="midday" class="active">Midday</button>
  <button onclick="setTime('sunset')" data-time="sunset">Sunset</button>
  <button onclick="setTime('midnight')" data-time="midnight">Midnight</button>
</div>
<div id="hud"><span id="hud-text"></span></div>
<div id="compass-wrap"><canvas id="compass-canvas" width="100" height="100"></canvas></div>
<div id="minimap"><canvas id="minimap-canvas" width="320" height="320"></canvas></div>
<div id="tweaks" style="position:fixed;top:10px;left:10px;background:rgba(0,0,0,0.55);color:#eee;font:12px monospace;padding:10px 12px;border-radius:6px;z-index:10;line-height:1.6;pointer-events:auto;min-width:180px">
  <div style="font-weight:bold;margin-bottom:4px">Tweaks</div>
  <div>Turn speed: <span id="tv-turn">1.80</span> <button data-tw="turn" data-d="-1">−</button><button data-tw="turn" data-d="1">+</button></div>
  <div>Mouse sens: <span id="tv-mouse">0.0020</span> <button data-tw="mouse" data-d="-1">−</button><button data-tw="mouse" data-d="1">+</button></div>
  <div>Walk: <span id="tv-walk">30</span> <button data-tw="walk" data-d="-1">−</button><button data-tw="walk" data-d="1">+</button></div>
  <div>Run: <span id="tv-run">65</span> <button data-tw="run" data-d="-1">−</button><button data-tw="run" data-d="1">+</button></div>
  <div style="margin-top:4px;opacity:0.7;font-size:11px">
    [ ] turn &nbsp; ; ' mouse<br>
    , . walk &nbsp; K L run
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ============================================================
// CONFIG — flat toroidal world
// ============================================================
const WORLD_SIZE = 2000;              // world wraps every WORLD_SIZE units in X and Z
const HALF = WORLD_SIZE / 2;
const PLAYER_HEIGHT = 5;
let WALK_SPEED = 30;
let RUN_SPEED = 65;
let TURN_SPEED = 1.8;
let MOUSE_SENS = 0.002;

// Returns the shortest signed delta from a to b on a wrap of size W.
// Result is in [-W/2, W/2].
function wrapDelta(a, b, W = WORLD_SIZE) {
  let d = b - a;
  d = ((d + W * 1.5) % W) - W / 2;
  return d;
}

// ============================================================
// TIME PRESETS (same as v1)
// ============================================================
const timePresets = {
  morning: {
    skyTop: new THREE.Color(0x4488CC), skyMid: new THREE.Color(0x99CCEE),
    skyBottom: new THREE.Color(0xFFDDAA),
    fog: new THREE.Color(0xDDC8A0), fogDensity: 0.0003,
    sunColor: new THREE.Color(0xFFE4B0), sunIntensity: 1.4,
    sunPos: new THREE.Vector3(-300, 120, 200),
    sunDir: new THREE.Vector3(-1, 0.35, 0.5).normalize(),
    ambientColor: new THREE.Color(0xFFEECC), ambientIntensity: 0.5,
    hemiSky: new THREE.Color(0x99CCEE), hemiGround: new THREE.Color(0xC8A882), hemiIntensity: 0.4,
    exposure: 1.0, bgColor: new THREE.Color(0x99CCEE),
    horizonNear: new THREE.Color(0xFFCC88), horizonFar: new THREE.Color(0xAABBDD),
    sunDiscColor: new THREE.Color(0xFFEE99), sunDiscSize: 0.04, sunDiscIntensity: 1.0,
    starOpacity: 0.0, moonOpacity: 0.0,
  },
  midday: {
    skyTop: new THREE.Color(0x2255AA), skyMid: new THREE.Color(0x66BBEE),
    skyBottom: new THREE.Color(0xD8D0C0),
    fog: new THREE.Color(0xC8C0A8), fogDensity: 0.00025,
    sunColor: new THREE.Color(0xFFFFF0), sunIntensity: 2.0,
    sunPos: new THREE.Vector3(100, 500, 50),
    sunDir: new THREE.Vector3(0.2, 1.0, 0.1).normalize(),
    ambientColor: new THREE.Color(0xFFFFEE), ambientIntensity: 0.7,
    hemiSky: new THREE.Color(0x66BBEE), hemiGround: new THREE.Color(0xC8A882), hemiIntensity: 0.5,
    exposure: 1.2, bgColor: new THREE.Color(0x66BBEE),
    horizonNear: new THREE.Color(0xD8D0C0), horizonFar: new THREE.Color(0xD8D0C0),
    sunDiscColor: new THREE.Color(0xFFFFF8), sunDiscSize: 0.03, sunDiscIntensity: 1.2,
    starOpacity: 0.0, moonOpacity: 0.0,
  },
  sunset: {
    skyTop: new THREE.Color(0x2A2055), skyMid: new THREE.Color(0xB87040),
    skyBottom: new THREE.Color(0xD4956A),
    fog: new THREE.Color(0xC09070), fogDensity: 0.0003,
    sunColor: new THREE.Color(0xFFAA55), sunIntensity: 1.1,
    sunPos: new THREE.Vector3(500, 30, 0),
    sunDir: new THREE.Vector3(1, 0.06, 0).normalize(),
    ambientColor: new THREE.Color(0xDD9966), ambientIntensity: 0.35,
    hemiSky: new THREE.Color(0x775544), hemiGround: new THREE.Color(0x554433), hemiIntensity: 0.3,
    exposure: 0.9, bgColor: new THREE.Color(0xB87040),
    horizonNear: new THREE.Color(0xFFBB55), horizonFar: new THREE.Color(0x3D3060),
    sunDiscColor: new THREE.Color(0xFFCC44), sunDiscSize: 0.06, sunDiscIntensity: 1.8,
    starOpacity: 0.2, moonOpacity: 0.0,
  },
  midnight: {
    skyTop: new THREE.Color(0x080818), skyMid: new THREE.Color(0x101028),
    skyBottom: new THREE.Color(0x181830),
    fog: new THREE.Color(0x101020), fogDensity: 0.00025,
    sunColor: new THREE.Color(0x8899CC), sunIntensity: 0.3,
    sunPos: new THREE.Vector3(-200, 300, -200),
    sunDir: new THREE.Vector3(-0.4, 0.7, -0.4).normalize(),
    ambientColor: new THREE.Color(0x334466), ambientIntensity: 0.45,
    hemiSky: new THREE.Color(0x1A1A44), hemiGround: new THREE.Color(0x151525), hemiIntensity: 0.2,
    exposure: 0.75, bgColor: new THREE.Color(0x080818),
    horizonNear: new THREE.Color(0x181830), horizonFar: new THREE.Color(0x181830),
    sunDiscColor: new THREE.Color(0x000000), sunDiscSize: 0.0, sunDiscIntensity: 0.0,
    starOpacity: 1.0, moonOpacity: 1.0,
  }
};
let targetPreset = timePresets.midday;
let transitionProgress = 1;

// ============================================================
// SCENE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x66BBEE);
scene.fog = new THREE.FogExp2(0xC8C0A8, 0.00025);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 12000);
camera.position.set(0, PLAYER_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ============================================================
// LIGHTING
// ============================================================
const ambient = new THREE.AmbientLight(0xFFFFEE, 0.7);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xFFFFF0, 2.0);
sun.position.set(100, 500, 50);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
sun.shadow.camera.far = 800;
scene.add(sun);
const hemi = new THREE.HemisphereLight(0x66BBEE, 0xC8A882, 0.5);
scene.add(hemi);

// ============================================================
// SKY DOME (follows camera)
// ============================================================
const skyGeo = new THREE.SphereGeometry(5500, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor: { value: new THREE.Color(0x2255AA) },
    midColor: { value: new THREE.Color(0x66BBEE) },
    bottomColor: { value: new THREE.Color(0xD8D0C0) },
    sunDirection: { value: new THREE.Vector3(0.2, 1.0, 0.1).normalize() },
    horizonNear: { value: new THREE.Color(0xD8D0C0) },
    horizonFar: { value: new THREE.Color(0xD8D0C0) },
    sunDiscColor: { value: new THREE.Color(0xFFFFF8) },
    sunDiscSize: { value: 0.03 },
    sunDiscIntensity: { value: 1.2 },
  },
  vertexShader: `
    varying vec3 vWorldDir;
    void main() {
      vWorldDir = normalize((modelMatrix * vec4(position, 1.0)).xyz - cameraPosition);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform vec3 topColor, midColor, bottomColor, sunDirection, horizonNear, horizonFar, sunDiscColor;
    uniform float sunDiscSize, sunDiscIntensity;
    varying vec3 vWorldDir;
    void main() {
      vec3 dir = normalize(vWorldDir);
      float h = dir.y;
      vec3 col = mix(bottomColor, midColor, smoothstep(0.0, 0.15, h));
      col = mix(col, topColor, smoothstep(0.15, 0.7, h));
      float sunDot = dot(normalize(vec3(dir.x, 0.0, dir.z)), normalize(vec3(sunDirection.x, 0.0, sunDirection.z)));
      vec3 hCol = mix(horizonFar, horizonNear, smoothstep(-0.3, 1.0, sunDot));
      col = mix(col, hCol, smoothstep(0.15, 0.0, h) * smoothstep(-0.05, 0.02, h) * 0.8);
      float sAng = acos(clamp(dot(dir, sunDirection), -1.0, 1.0));
      col += sunDiscColor * exp(-sAng*sAng*8.0) * 0.4 * sunDiscIntensity;
      col = mix(col, sunDiscColor * sunDiscIntensity, smoothstep(sunDiscSize, sunDiscSize*0.5, sAng));
      gl_FragColor = vec4(col, 1.0);
    }`
});
const skyDome = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyDome);

// ============================================================
// STARS (follow camera)
// ============================================================
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
  const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI * 0.48, r = 5200;
  starPos[i*3] = r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1] = r*Math.cos(ph);
  starPos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 2.5, transparent: true, opacity: 0, sizeAttenuation: false });
const starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

// ============================================================
// MOON (follows camera, offset)
// ============================================================
const moonGroup = new THREE.Group();
const moonMat = new THREE.MeshBasicMaterial({ color: 0xFFFFEE, transparent: true, opacity: 0 });
moonGroup.add(new THREE.Mesh(new THREE.CircleGeometry(220, 32), moonMat));
const craterMat_ = new THREE.MeshBasicMaterial({ color: 0xCCCCBB, transparent: true, opacity: 0 });
[[-25,20,18],[30,-15,22],[-10,-35,15],[40,25,12],[-35,-10,10],[15,40,14],[-5,10,20],[25,5,8]].forEach(([x,y,r]) => {
  const m = new THREE.Mesh(new THREE.CircleGeometry(r, 16), craterMat_.clone());
  m.position.set(x, y, 1); moonGroup.add(m);
});
const MOON_OFFSET = new THREE.Vector3(-2000, 3500, -1500);
scene.add(moonGroup);
const moonLight = new THREE.PointLight(0x99AADD, 0, 8000);
scene.add(moonLight);
const moonGlowMat = new THREE.SpriteMaterial({ color: 0xCCDDFF, transparent: true, opacity: 0, blending: THREE.AdditiveBlending });
const moonGlow = new THREE.Sprite(moonGlowMat);
moonGlow.scale.set(800, 800, 1);
scene.add(moonGlow);

// ============================================================
// GROUND — single huge plane that follows the player.
// Because the texture uses RepeatWrapping and we offset the UVs by the
// player's world position, the ground appears to stay fixed in world space
// while the mesh itself stays centered on the camera.
// ============================================================
const groundCanvas = document.createElement('canvas');
groundCanvas.width = groundCanvas.height = 512;
const gCtx = groundCanvas.getContext('2d');
gCtx.fillStyle = '#C8A872';
gCtx.fillRect(0, 0, 512, 512);
for (let i = 0; i < 30000; i++) {
  const shade = 160 + Math.random() * 60;
  gCtx.fillStyle = `rgb(${shade},${shade*0.8},${shade*0.55})`;
  gCtx.fillRect(Math.random()*512, Math.random()*512, 1+Math.random()*2, 1+Math.random()*2);
}
const groundTex = new THREE.CanvasTexture(groundCanvas);
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
const GROUND_TILE = 20;   // world units per texture tile
const GROUND_PLANE_SIZE = 8000; // big enough to cover the view frustum
groundTex.repeat.set(GROUND_PLANE_SIZE / GROUND_TILE, GROUND_PLANE_SIZE / GROUND_TILE);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(GROUND_PLANE_SIZE, GROUND_PLANE_SIZE),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95, metalness: 0, color: 0xD4B888 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// MOUNTAINS (backdrop ring — parented to a group that follows the camera,
// so they stay far away in all directions and never become reachable)
// ============================================================
const mountainFollower = new THREE.Group();
scene.add(mountainFollower);
function createMountainRange(radius, count, minH, maxH, c1, c2) {
  for (let i = 0; i < count; i++) {
    const a = (i/count)*Math.PI*2+(Math.random()-0.5)*0.3;
    const d = radius+(Math.random()-0.5)*400;
    const h = minH+Math.random()*(maxH-minH);
    const bw = h*(1.5+Math.random()*1.8);
    const geo = new THREE.ConeGeometry(bw, h, 5+Math.floor(Math.random()*4), 1);
    const p = geo.attributes.position;
    for (let j = 0; j < p.count; j++) {
      if (p.getY(j) < h*0.49) { p.setX(j, p.getX(j)+(Math.random()-0.5)*bw*0.15); p.setZ(j, p.getZ(j)+(Math.random()-0.5)*bw*0.15); }
      p.setY(j, p.getY(j)+(Math.random()-0.5)*h*0.08);
    }
    geo.computeVertexNormals();
    const col = new THREE.Color(c1).lerp(new THREE.Color(c2), Math.random());
    const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: col, roughness: 0.9, flatShading: true }));
    m.position.set(Math.cos(a)*d, h*0.45, Math.sin(a)*d);
    m.rotation.y = Math.random()*Math.PI;
    mountainFollower.add(m);
  }
}
createMountainRange(5200, 35, 300, 700, 0x8B7355, 0x6B5B45);
createMountainRange(4600, 28, 200, 500, 0x9B8365, 0x7B6B55);
createMountainRange(4000, 18, 100, 300, 0xA08060, 0x907050);

// ============================================================
// WRAP-AWARE OBJECTS
// For each object with a fixed world position, every frame we compute its
// shortest wrapped delta from the player and set its mesh position to
// (player + delta). This gives seamless looping without ghost copies.
// ============================================================
const wrapObjects = []; // { x, z, mesh, visibleDist }

function addWrapObject(x, z, mesh, visibleDist = 3000) {
  scene.add(mesh);
  wrapObjects.push({ x, z, mesh, visibleDist });
}

// ============================================================
// ROADS — two perpendicular roads through origin, each as a series of
// short tiled segments that tile the full world width.
// ============================================================
const roadMat = new THREE.MeshStandardMaterial({ color: 0x8B7B65, roughness: 0.85 });
const ROAD_SEG_LEN = 40;
const ROAD_SEGS_PER_AXIS = Math.ceil(WORLD_SIZE / ROAD_SEG_LEN);
// East-west road (along X axis, z = 0)
for (let i = 0; i < ROAD_SEGS_PER_AXIS; i++) {
  const x = -HALF + (i + 0.5) * ROAD_SEG_LEN;
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(ROAD_SEG_LEN * 1.02, 0.12, 6), roadMat);
  mesh.receiveShadow = true;
  addWrapObject(x, 0, mesh, 2500);
}
// North-south road (along Z axis, x = 0)
for (let i = 0; i < ROAD_SEGS_PER_AXIS; i++) {
  const z = -HALF + (i + 0.5) * ROAD_SEG_LEN;
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 0.12, ROAD_SEG_LEN * 1.02), roadMat);
  mesh.receiveShadow = true;
  addWrapObject(0, z, mesh, 2500);
}

// ============================================================
// LANDMARKS — 8 distinctive structures placed around the world.
// Positions on the flat (x, z) grid. Roughly spread out so you can find
// them by walking along the roads.
// ============================================================
let windmillBlades = null;

function addLandmark(x, z, group) {
  addWrapObject(x, z, group, 3000);
}

// 1. Crossroads Gate (0, 0) — at the road intersection
{
  const g = new THREE.Group();
  const pm = new THREE.MeshStandardMaterial({ color: 0xC8A060, roughness: 0.8 });
  const bm = new THREE.MeshStandardMaterial({ color: 0x8B6B3A, roughness: 0.7 });
  const p1 = new THREE.Mesh(new THREE.BoxGeometry(2, 20, 2), pm); p1.position.set(-5, 10, 0);
  const p2 = new THREE.Mesh(new THREE.BoxGeometry(2, 20, 2), pm); p2.position.set(5, 10, 0);
  const beam = new THREE.Mesh(new THREE.BoxGeometry(14, 1.5, 2), bm); beam.position.set(0, 20.5, 0);
  const sign = new THREE.Mesh(new THREE.BoxGeometry(10, 3, 0.3), new THREE.MeshStandardMaterial({ color: 0x5A4A2A }));
  sign.position.set(0, 17, 0);
  [p1,p2,beam,sign].forEach(m => { m.castShadow = true; g.add(m); });
  addLandmark(0, 0, g);
}
// 2. Red Obelisk (east road, far east)
{
  const g = new THREE.Group();
  const ob = new THREE.Mesh(new THREE.CylinderGeometry(1, 3, 40, 4), new THREE.MeshStandardMaterial({ color: 0xCC2211, roughness: 0.5 }));
  ob.position.y = 20; ob.castShadow = true;
  const top = new THREE.Mesh(new THREE.ConeGeometry(2, 6, 4), new THREE.MeshStandardMaterial({ color: 0xFF4422, emissive: 0xFF2200, emissiveIntensity: 0.5 }));
  top.position.y = 43; top.castShadow = true;
  g.add(ob, top);
  addLandmark(700, 0, g);
}
// 3. Blue Pyramid (west road, far west)
{
  const g = new THREE.Group();
  const py = new THREE.Mesh(new THREE.ConeGeometry(12, 25, 4), new THREE.MeshStandardMaterial({ color: 0x2244AA, roughness: 0.4, metalness: 0.3 }));
  py.position.y = 12.5; py.castShadow = true;
  g.add(py);
  addLandmark(-700, 0, g);
}
// 4. Windmill (north road)
{
  const g = new THREE.Group();
  const tw = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 3, 25, 6), new THREE.MeshStandardMaterial({ color: 0x9B8B70, roughness: 0.8 }));
  tw.position.y = 12.5; tw.castShadow = true;
  const pl = new THREE.Mesh(new THREE.BoxGeometry(5, 1, 5), new THREE.MeshStandardMaterial({ color: 0x7B6B55 }));
  pl.position.y = 25;
  const bg = new THREE.Group(); bg.position.set(0, 27, 2);
  bg.add(new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 1, 8), new THREE.MeshStandardMaterial({ color: 0x666666 })));
  bg.children[0].rotation.x = Math.PI/2;
  for (let i = 0; i < 4; i++) {
    const bl = new THREE.Mesh(new THREE.BoxGeometry(1.2, 10, 0.15), new THREE.MeshStandardMaterial({ color: 0xAA9977 }));
    bl.position.y = 5.5;
    const arm = new THREE.Group(); arm.add(bl);
    arm.rotation.z = i/4*Math.PI*2;
    bg.add(arm);
  }
  windmillBlades = bg;
  g.add(tw, pl, bg);
  addLandmark(0, -700, g);
}
// 5. Water Tower (south road)
{
  const g = new THREE.Group();
  const lm = new THREE.MeshStandardMaterial({ color: 0x8B7B60, roughness: 0.8 });
  for (let i = 0; i < 4; i++) {
    const a = i/4*Math.PI*2 + Math.PI/4;
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.7, 20, 6), lm);
    leg.position.set(Math.cos(a)*4, 10, Math.sin(a)*4); leg.castShadow = true;
    g.add(leg);
  }
  const tk = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 8, 12), new THREE.MeshStandardMaterial({ color: 0x7799AA, roughness: 0.6, metalness: 0.2 }));
  tk.position.y = 24; tk.castShadow = true;
  const rf = new THREE.Mesh(new THREE.ConeGeometry(5.5, 3, 12), lm); rf.position.y = 29.5;
  g.add(tk, rf);
  addLandmark(0, 700, g);
}
// 6. Stone Arch (diagonal NE)
{
  const g = new THREE.Group();
  const m = new THREE.MeshStandardMaterial({ color: 0xAA9070, roughness: 0.95, flatShading: true });
  const p1 = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3, 18, 5), m); p1.position.set(-6, 9, 0);
  const p2 = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3, 18, 5), m); p2.position.set(6, 9, 0);
  const arc = new THREE.Mesh(new THREE.TorusGeometry(6, 2.5, 6, 12, Math.PI), m);
  arc.position.set(0, 18, 0); arc.rotation.z = Math.PI;
  [p1,p2,arc].forEach(x => { x.castShadow = true; g.add(x); });
  addLandmark(500, -500, g);
}
// 7. Signpost (diagonal SW)
{
  const g = new THREE.Group();
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 12, 6), new THREE.MeshStandardMaterial({ color: 0x7B6B50 }));
  post.position.y = 6; post.castShadow = true; g.add(post);
  [{y:11,r:0.3},{y:9.5,r:-0.5},{y:8,r:0.8}].forEach(s => {
    const sg = new THREE.Mesh(new THREE.BoxGeometry(6, 1.2, 0.3), new THREE.MeshStandardMaterial({ color: 0x9B8B60 }));
    sg.position.set(2, s.y, 0); sg.rotation.y = s.r; sg.castShadow = true; g.add(sg);
  });
  addLandmark(-500, 500, g);
}
// 8. Desert Cross (diagonal SE)
{
  const g = new THREE.Group();
  const m = new THREE.MeshStandardMaterial({ color: 0x8B7B55, roughness: 0.8 });
  const v = new THREE.Mesh(new THREE.BoxGeometry(1.5, 18, 1.5), m); v.position.y = 9;
  const h = new THREE.Mesh(new THREE.BoxGeometry(10, 1.5, 1.5), m); h.position.y = 14;
  v.castShadow = h.castShadow = true;
  g.add(v, h);
  addLandmark(500, 500, g);
}

// Export landmark positions for the minimap (those that are not road segments).
const landmarkDots = wrapObjects
  .filter(o => o.visibleDist >= 3000)
  .map(o => ({ x: o.x, z: o.z }));

// ============================================================
// ROCKS & SCRUB — scattered across the world at random fixed positions
// ============================================================
{
  const rg = new THREE.DodecahedronGeometry(1, 0);
  const rm = new THREE.MeshStandardMaterial({ color: 0x9B8B75, roughness: 0.95, flatShading: true });
  for (let i = 0; i < 300; i++) {
    const mesh = new THREE.Mesh(rg, rm.clone());
    const s = 0.5+Math.random()*2.5;
    mesh.scale.set(s*(0.7+Math.random()*0.6), s*(0.5+Math.random()*0.5), s*(0.7+Math.random()*0.6));
    mesh.rotation.set(Math.random(), Math.random(), Math.random());
    mesh.material.color.offsetHSL(0, 0, (Math.random()-0.5)*0.1);
    mesh.castShadow = true;
    const x = (Math.random()-0.5)*WORLD_SIZE;
    const z = (Math.random()-0.5)*WORLD_SIZE;
    mesh.position.y = s*0.2; // will be kept, wrap logic only touches x/z
    addWrapObject(x, z, mesh, 1500);
  }
  const sm = new THREE.MeshStandardMaterial({ color: 0x6B7B3A, roughness: 0.9 });
  for (let i = 0; i < 150; i++) {
    const g = new THREE.Group();
    for (let b = 0; b < 2+Math.floor(Math.random()*4); b++) {
      const s = 0.3+Math.random()*0.8;
      const sp = new THREE.Mesh(new THREE.SphereGeometry(s, 5, 4), sm.clone());
      sp.position.set((Math.random()-0.5)*1.5, s*0.5, (Math.random()-0.5)*1.5);
      sp.material.color.offsetHSL(Math.random()*0.05, 0, (Math.random()-0.5)*0.15);
      sp.castShadow = true; g.add(sp);
    }
    const x = (Math.random()-0.5)*WORLD_SIZE;
    const z = (Math.random()-0.5)*WORLD_SIZE;
    addWrapObject(x, z, g, 1500);
  }
}

// ============================================================
// PLAYER STATE — plain 2D: x, z, yaw. That's it.
// ============================================================
const player = { x: 0, z: 100, yaw: 0 }; // start just south of the crossroads
let lookYaw = 0, lookPitch = 0;
const keys = {};
let locked = false;

// ============================================================
// CONTROLS
// ============================================================
const timeNames = ['morning', 'midday', 'sunset', 'midnight'];
let currentTimeIndex = 1;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    currentTimeIndex = (currentTimeIndex + 1) % 4;
    window.setTime(timeNames[currentTimeIndex]);
  } else if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    currentTimeIndex = (currentTimeIndex + 3) % 4;
    window.setTime(timeNames[currentTimeIndex]);
  } else if (e.code === 'BracketLeft')  { adjustTweak('turn', -1);
  } else if (e.code === 'BracketRight') { adjustTweak('turn', 1);
  } else if (e.code === 'Semicolon')    { adjustTweak('mouse', -1);
  } else if (e.code === 'Quote')        { adjustTweak('mouse', 1);
  } else if (e.code === 'Comma')        { adjustTweak('walk', -1);
  } else if (e.code === 'Period')       { adjustTweak('walk', 1);
  } else if (e.code === 'KeyK')         { adjustTweak('run', -1);
  } else if (e.code === 'KeyL')         { adjustTweak('run', 1);
  }
  if (locked) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function refreshTweaks() {
  document.getElementById('tv-turn').textContent = TURN_SPEED.toFixed(2);
  document.getElementById('tv-mouse').textContent = MOUSE_SENS.toFixed(4);
  document.getElementById('tv-walk').textContent = WALK_SPEED.toFixed(0);
  document.getElementById('tv-run').textContent = RUN_SPEED.toFixed(0);
}
function adjustTweak(kind, dir) {
  if (kind === 'turn')  TURN_SPEED  = Math.max(0.1, TURN_SPEED  + dir * 0.1);
  if (kind === 'mouse') MOUSE_SENS  = Math.max(0.0002, MOUSE_SENS + dir * 0.0002);
  if (kind === 'walk')  WALK_SPEED  = Math.max(1, WALK_SPEED + dir * 5);
  if (kind === 'run')   RUN_SPEED   = Math.max(1, RUN_SPEED  + dir * 5);
  refreshTweaks();
}
document.querySelectorAll('#tweaks button').forEach(b => {
  b.addEventListener('click', ev => {
    ev.stopPropagation();
    adjustTweak(b.dataset.tw, parseInt(b.dataset.d, 10));
  });
});
refreshTweaks();

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  const hide = locked ? 'none' : 'flex';
  document.getElementById('overlay').style.display = hide;
  ['crosshair','hud','compass-wrap','minimap'].forEach(id =>
    document.getElementById(id).style.display = locked ? 'block' : 'none'
  );
  document.getElementById('time-buttons').style.display = locked ? 'flex' : 'none';
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  lookYaw += e.movementX * MOUSE_SENS;
  lookPitch -= e.movementY * MOUSE_SENS;
  lookPitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lookPitch));
});

window.startGame = () => renderer.domElement.requestPointerLock();

// ============================================================
// TIME OF DAY
// ============================================================
window.setTime = (name) => {
  targetPreset = timePresets[name];
  transitionProgress = 0;
  document.querySelectorAll('#time-buttons button').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.time === name)
  );
};

function applyTimeOfDay(dt) {
  if (transitionProgress >= 1) return;
  transitionProgress = Math.min(1, transitionProgress + dt * 0.8);
  const s = transitionProgress * transitionProgress * (3 - 2 * transitionProgress);
  skyMat.uniforms.topColor.value.lerp(targetPreset.skyTop, s);
  skyMat.uniforms.midColor.value.lerp(targetPreset.skyMid, s);
  skyMat.uniforms.bottomColor.value.lerp(targetPreset.skyBottom, s);
  skyMat.uniforms.sunDirection.value.lerp(targetPreset.sunDir, s);
  skyMat.uniforms.horizonNear.value.lerp(targetPreset.horizonNear, s);
  skyMat.uniforms.horizonFar.value.lerp(targetPreset.horizonFar, s);
  skyMat.uniforms.sunDiscColor.value.lerp(targetPreset.sunDiscColor, s);
  skyMat.uniforms.sunDiscSize.value += (targetPreset.sunDiscSize - skyMat.uniforms.sunDiscSize.value) * s;
  skyMat.uniforms.sunDiscIntensity.value += (targetPreset.sunDiscIntensity - skyMat.uniforms.sunDiscIntensity.value) * s;
  scene.fog.color.lerp(targetPreset.fog, s);
  scene.fog.density += (targetPreset.fogDensity - scene.fog.density) * s;
  scene.background.lerp(targetPreset.bgColor, s);
  sun.color.lerp(targetPreset.sunColor, s);
  sun.intensity += (targetPreset.sunIntensity - sun.intensity) * s;
  sun.position.lerp(targetPreset.sunPos, s);
  ambient.color.lerp(targetPreset.ambientColor, s);
  ambient.intensity += (targetPreset.ambientIntensity - ambient.intensity) * s;
  hemi.color.lerp(targetPreset.hemiSky, s);
  hemi.groundColor.lerp(targetPreset.hemiGround, s);
  hemi.intensity += (targetPreset.hemiIntensity - hemi.intensity) * s;
  renderer.toneMappingExposure += (targetPreset.exposure - renderer.toneMappingExposure) * s;
  starMat.opacity += (targetPreset.starOpacity - starMat.opacity) * s;
  moonMat.opacity += (targetPreset.moonOpacity - moonMat.opacity) * s;
  moonGroup.children.forEach(ch => {
    if (ch.material && ch.material !== moonMat)
      ch.material.opacity += (targetPreset.moonOpacity * 0.7 - ch.material.opacity) * s;
  });
  moonLight.intensity += ((targetPreset.moonOpacity > 0 ? 0.8 : 0) - moonLight.intensity) * s;
  moonGlowMat.opacity += ((targetPreset.moonOpacity > 0 ? 0.3 : 0) - moonGlowMat.opacity) * s;
}

// ============================================================
// MINIMAP — 2D square showing the wrap tile, roads, landmarks, player.
// ============================================================
const miniCanvas = document.getElementById('minimap-canvas');
const miniCtx = miniCanvas.getContext('2d');
function drawMinimap() {
  const W = miniCanvas.width, H = miniCanvas.height;
  miniCtx.clearRect(0, 0, W, H);
  // Background
  miniCtx.fillStyle = 'rgba(40, 30, 15, 0.85)';
  miniCtx.fillRect(0, 0, W, H);
  // World -> canvas: (x, z) in [-HALF, HALF] -> [0, W]
  const scale = W / WORLD_SIZE;
  const cx = (x) => (x + HALF) * scale;
  const cz = (z) => (z + HALF) * scale;
  // Roads
  miniCtx.strokeStyle = 'rgba(200, 150, 80, 0.7)';
  miniCtx.lineWidth = 2;
  miniCtx.beginPath();
  miniCtx.moveTo(0, cz(0)); miniCtx.lineTo(W, cz(0));
  miniCtx.moveTo(cx(0), 0); miniCtx.lineTo(cx(0), H);
  miniCtx.stroke();
  // Landmarks
  miniCtx.fillStyle = 'rgba(240, 220, 160, 0.9)';
  for (const d of landmarkDots) {
    miniCtx.beginPath();
    miniCtx.arc(cx(d.x), cz(d.z), 4, 0, Math.PI*2);
    miniCtx.fill();
  }
  // Player — always centered in visible area is simpler, but showing the
  // real position on the tile is informative. Draw a red dot + heading triangle.
  const px = cx(player.x), pz = cz(player.z);
  miniCtx.save();
  miniCtx.translate(px, pz);
  miniCtx.rotate(player.yaw + lookYaw);
  miniCtx.fillStyle = 'rgba(255, 80, 60, 1)';
  miniCtx.beginPath();
  miniCtx.moveTo(0, -7); miniCtx.lineTo(5, 5); miniCtx.lineTo(-5, 5); miniCtx.closePath();
  miniCtx.fill();
  miniCtx.restore();
}

// ============================================================
// COMPASS
// ============================================================
const compassCtx = document.getElementById('compass-canvas').getContext('2d');
function drawCompass(northAngle) {
  const c = compassCtx;
  c.clearRect(0, 0, 100, 100);
  c.save(); c.translate(50, 50);
  c.rotate(northAngle);
  c.beginPath(); c.moveTo(0, -38); c.lineTo(-8, 5); c.lineTo(0, -2); c.lineTo(8, 5); c.closePath();
  c.fillStyle = 'rgba(220,50,30,0.7)'; c.fill();
  c.beginPath(); c.moveTo(0, 38); c.lineTo(-6, -2); c.lineTo(0, 5); c.lineTo(6, -2); c.closePath();
  c.fillStyle = 'rgba(200,190,170,0.4)'; c.fill();
  c.fillStyle = 'rgba(232,213,176,0.8)'; c.font = 'bold 14px Georgia'; c.textAlign = 'center';
  c.fillText('N', 0, -22);
  c.fillStyle = 'rgba(232,213,176,0.4)'; c.font = '11px Georgia';
  c.fillText('S', 0, 30); c.fillText('E', 30, 5); c.fillText('W', -30, 5);
  c.restore();
}

// ============================================================
// ANIMATION
// ============================================================
const clock = new THREE.Clock();
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const walkBob = { phase: 0 };

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  applyTimeOfDay(dt);

  if (locked) {
    const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? RUN_SPEED : WALK_SPEED;

    // A/D: pure camera yaw, same as mouse
    if (keys['KeyA'] || keys['ArrowLeft'])  lookYaw -= TURN_SPEED * dt;
    if (keys['KeyD'] || keys['ArrowRight']) lookYaw += TURN_SPEED * dt;

    // W/S: walk in whichever direction the camera is facing.
    let moveAmount = 0;
    if (keys['KeyW'] || keys['ArrowUp']) moveAmount += 1;
    if (keys['KeyS'] || keys['ArrowDown']) moveAmount -= 1;
    if (moveAmount !== 0) {
      // Camera forward in world XZ: at lookYaw=0, forward is -Z.
      // (Three.js rotates forward (0,0,-1) by euler.y=-lookYaw → (sin yaw, 0, -cos yaw).)
      const fx = Math.sin(lookYaw);
      const fz = -Math.cos(lookYaw);
      const step = moveAmount * speed * dt;
      player.x += fx * step;
      player.z += fz * step;
      // Wrap to [-HALF, HALF)
      player.x = ((player.x + HALF) % WORLD_SIZE + WORLD_SIZE) % WORLD_SIZE - HALF;
      player.z = ((player.z + HALF) % WORLD_SIZE + WORLD_SIZE) % WORLD_SIZE - HALF;
      walkBob.phase += dt * (speed === RUN_SPEED ? 12 : 8);
    }
  }

  // Camera rides on the player's world position. Bob for walking feel.
  const bobY = PLAYER_HEIGHT + Math.sin(walkBob.phase) * 0.2;
  camera.position.set(player.x, bobY, player.z);
  euler.y = -lookYaw;
  euler.x = lookPitch;
  camera.quaternion.setFromEuler(euler);

  // Sky, stars, mountains all ride along with the camera.
  skyDome.position.set(player.x, 0, player.z);
  starField.position.set(player.x, 0, player.z);
  mountainFollower.position.set(player.x, 0, player.z);
  moonGroup.position.set(player.x + MOON_OFFSET.x, MOON_OFFSET.y, player.z + MOON_OFFSET.z);
  moonGroup.lookAt(camera.position);
  moonLight.position.copy(moonGroup.position);
  moonGlow.position.copy(moonGroup.position);

  // Ground: follow player in world space, offset UVs so the texture
  // appears nailed to the world.
  ground.position.set(player.x, 0, player.z);
  groundTex.offset.x = player.x / GROUND_TILE;
  groundTex.offset.y = -player.z / GROUND_TILE;

  // Wrap-aware objects: for each, place at player + shortestDelta(object, player).
  for (const o of wrapObjects) {
    const dx = wrapDelta(player.x, o.x);
    const dz = wrapDelta(player.z, o.z);
    const d2 = dx*dx + dz*dz;
    if (d2 > o.visibleDist * o.visibleDist) {
      o.mesh.visible = false;
      continue;
    }
    o.mesh.visible = true;
    o.mesh.position.x = player.x + dx;
    o.mesh.position.z = player.z + dz;
  }

  if (windmillBlades) windmillBlades.rotation.z += dt * 0.5;

  // Compass: show which way is world +Z (= "north" by convention).
  // Camera forward yaw relative to -Z is `-lookYaw`, so north angle in
  // screen-compass terms is `lookYaw + π`.
  drawCompass(lookYaw + Math.PI);

  // HUD: x, z coordinates (as integers for readability)
  document.getElementById('hud-text').textContent =
    `X ${player.x.toFixed(0)}  Z ${player.z.toFixed(0)}`;

  drawMinimap();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
