<!DOCTYPE html>

<head>

<title>West Texas Environment</title>
<style>
* { margin: 0; padding: 0; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.6); z-index: 10; cursor: pointer;
}
#overlay div {
  color: #e8d5b0; font-family: Georgia, serif; text-align: center;
  font-size: 22px; line-height: 1.8;
}
#overlay div span { font-size: 14px; color: #c0a878; display: block; margin-top: 4px; }
#crosshair {
  position: fixed; top: 50%; left: 50%;
  width: 4px; height: 4px; margin: -2px 0 0 -2px;
  background: rgba(255,255,255,0.3); border-radius: 50%;
  pointer-events: none; z-index: 5; display: none;
}
#time-buttons {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);

  background: rgba(0,0,0,0.5); color: #e8d5b0; border: 1px solid rgba(232,213,176,0.3);
  padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: 4px;
  font-family: Georgia, serif; transition: background 0.2s;
}
#time-buttons button:hover { background: rgba(60,40,20,0.7); }
#time-buttons button.active { background: rgba(120,80,30,0.7); border-color: #e8d5b0; }
#hud {
  position: fixed; bottom: 20px; left: 20px;
  color: rgba(232,213,176,0.6); font: 13px Georgia, serif;
  pointer-events: none; z-index: 5; display: none; line-height: 1.6;
}
#compass-wrap {
  position: fixed; top: 20px; right: 20px;
  width: 50px; height: 50px; display: none; z-index: 5; pointer-events: none;
}
#compass-wrap canvas { width: 100%; height: 100%; }
#minimap {
  position: fixed; bottom: 70px; right: 15px;
  width: 160px; height: 160px; display: none; z-index: 5; pointer-events: none;
  border: 1px solid rgba(232,213,176,0.25); border-radius: 6px;
  background: rgba(0,0,0,0.35); overflow: hidden;
}
#minimap canvas { width: 100%; height: 100%; }

<script type="module">
import * as THREE from 'three';

// ============================================================
// CONFIG — flat toroidal world
// ============================================================
const WORLD_SIZE = 2000;              // world wraps every WORLD_SIZE units in X and Z
const HALF = WORLD_SIZE / 2;
const PLAYER_HEIGHT = 5;
let WALK_SPEED = 30;
let RUN_SPEED = 65;
let TURN_SPEED = 1.8;
let MOUSE_SENS = 0.002;
let NIGHT_BRIGHT = 0.50; // ADDITIVE ambient added at night on top of keyframe value (0=dark, no upper limit)

// Returns the shortest signed delta from a to b on a wrap of size W.
// Result is in [-W/2, W/2].
function wrapDelta(a, b, W = WORLD_SIZE) {
  let d = b - a;
  d = ((d + W * 1.5) % W) - W / 2;
  return d;
}

// ============================================================
// CONTINUOUS 24-HOUR DAY / NIGHT CYCLE
// timeOfDay is decimal hours [0, 24). Sun rises ~6, sets ~18.
// +/- keys jump 1 hour. Auto-advances at TIME_SPEED hr/sec.
// ============================================================
let timeOfDay = 10.0; // start mid-morning
const TIME_SPEED = 1 / 60; // 1 game-hour per real minute → full day in 24 min

// Sky keyframes — each row is one moment in the day.
// Colors stored as hex ints; floats are scalars.
// Fields: h(our), skyT(op), skyM(id), skyB(ot), hN(earHorizon), hF(arHorizon),
//         fog(color), fogD(ensity), sunC(olor), sunI(ntensity),
//         ambC, ambI, hkC(hemiSky), hgC(hemiGnd), hkI,
//         expo(sure), stars, moon, discC(olor), discS(ize), discI(ntensity)
const SKY_KEYS = [
// h     skyT      skyM      skyB      hN        hF        fog       fogD    sunC      sunI  ambC      ambI  hkC       hgC       hkI   expo  stars moon  discC     discS  discI
 [0,   0x0A1428, 0x0F1C35, 0x162240, 0x1C2C4A, 0x08101E, 0x0D1A30, 0.00010, 0xBBCCEE, 0.00, 0x1E304E, 0.22, 0x0F1C35, 0x0A1220, 0.28, 0.78, 1.0, 1.0, 0x000000, 0.00, 0.0],
 [4.5, 0x0C1A30, 0x122238, 0x182C46, 0x1E3050, 0x0A1424, 0x101E38, 0.00010, 0xBBCCEE, 0.00, 0x20304E, 0.24, 0x12203C, 0x0C1424, 0.30, 0.78, 0.9, 0.8, 0x000000, 0.00, 0.0],
 [5.5, 0x1A1040, 0x5C2410, 0xBB4820, 0xFF8822, 0x401878, 0x9A5838, 0.00030, 0xFF8844, 0.00, 0xCC9966, 0.28, 0x5A3070, 0x3A2810, 0.22, 0.70, 0.4, 0.3, 0xFFAA44, 0.10, 0.0],
 [6.0, 0x281450, 0xCC4A28, 0xFF9955, 0xFFD040, 0x503888, 0xC09060, 0.00035, 0xFFDD99, 0.60, 0xFFE8D0, 0.42, 0x7755AA, 0x6B4E28, 0.32, 0.82, 0.1, 0.05,0xFFBB33, 0.08, 2.2],
 [6.5, 0x1C2E80, 0xDD8840, 0xFFBB77, 0xFFDD88, 0x6688CC, 0xCCA060, 0.00030, 0xFFEECC, 1.20, 0xFFF0D8, 0.50, 0x8899CC, 0x9A7844, 0.40, 0.90, 0.0, 0.0, 0xFFEE88, 0.05, 1.6],
 [7.5, 0x1A3490, 0x88AADD, 0xE8C888, 0xFFCC77, 0x4466CC, 0xD0B070, 0.00030, 0xFFE888, 1.70, 0xFFEEAA, 0.52, 0x6699DD, 0xC0A870, 0.42, 0.95, 0.0, 0.0, 0xFFEE99, 0.04, 1.3],
 [10,  0x1244BB, 0x55AAEE, 0xC8C0A8, 0xD0C8A0, 0xAABBDD, 0xC0B890, 0.00025, 0xFFF8E8, 2.00, 0xFFFFDD, 0.68, 0x77AADD, 0xC0A872, 0.50, 1.15, 0.0, 0.0, 0xFFFFEE, 0.028,1.3],
 [12,  0x0E3AAA, 0x50AAEE, 0xC0B8A8, 0xC8C0A0, 0xA8B8D8, 0xB8B0A0, 0.00022, 0xFFFFF8, 2.20, 0xFFFFFF, 0.78, 0x66AAEE, 0xC8A880, 0.55, 1.25, 0.0, 0.0, 0xFFFFFF, 0.024,1.4],
 [15,  0x1040AA, 0x58AADD, 0xC8BC9A, 0xCCBB88, 0x9AAABB, 0xBBA880, 0.00024, 0xFFEECC, 2.00, 0xFFEEDD, 0.68, 0x6699CC, 0xC0A068, 0.48, 1.12, 0.0, 0.0, 0xFFEECC, 0.028,1.2],
 [17,  0x22105A, 0xB84822, 0xFF8840, 0xFFCC33, 0x3C1860, 0xAA7040, 0.00030, 0xFFDDAA, 1.40, 0xFFE8CC, 0.46, 0x703388, 0x6A5030, 0.36, 0.96, 0.05,0.0, 0xFFAA33, 0.06, 1.8],
 [17.8,0x18082E, 0x992800, 0xFF5010, 0xFFBB20, 0x600840, 0x904020, 0.00035, 0xFFCCAA, 0.90, 0xFFDDCC, 0.34, 0x560C80, 0x3A2810, 0.26, 0.86, 0.12,0.08,0xFF7722, 0.09, 2.4],
 [18.0,0x120520, 0x4A1400, 0xCC3A00, 0xAA5022, 0x3C0838, 0x6A2818, 0.00030, 0xFFAA88, 0.15, 0xCC9977, 0.22, 0x380C60, 0x281808, 0.20, 0.74, 0.45,0.35,0xFF4400, 0.04, 0.5],
 [19,  0x08101E, 0x0D1830, 0x121E38, 0x182840, 0x060E1C, 0x0A1428, 0.00012, 0xBBCCEE, 0.00, 0x182840, 0.18, 0x0D1828, 0x08101C, 0.24, 0.72, 0.85,0.85,0x000000, 0.00, 0.0],
 [21,  0x0A1428, 0x0F1C35, 0x162240, 0x1C2C4A, 0x08101E, 0x0D1A30, 0.00010, 0xBBCCEE, 0.00, 0x1E304E, 0.22, 0x0F1C35, 0x0A1220, 0.28, 0.78, 1.0, 1.0, 0x000000, 0.00, 0.0],
 [24,  0x0A1428, 0x0F1C35, 0x162240, 0x1C2C4A, 0x08101E, 0x0D1A30, 0.00010, 0xBBCCEE, 0.00, 0x1E304E, 0.22, 0x0F1C35, 0x0A1220, 0.28, 0.78, 1.0, 1.0, 0x000000, 0.00, 0.0],
];

// Column indices for readability
const [KH,KST,KSM,KSB,KHN,KHF,KFOG,KFOGD,KSUNC,KSUNI,KAMBC,KAMBI,KHKC,KHGC,KHKI,KEXPO,KSTARS,KMOON,KDISC,KDISCS,KDISCI] = [...Array(21).keys()];

function lerpSkyState(hour) {
  const h = ((hour % 24) + 24) % 24;
  let lo = SKY_KEYS[SKY_KEYS.length - 2], hi = SKY_KEYS[SKY_KEYS.length - 1];
  for (let i = 0; i < SKY_KEYS.length - 1; i++) {
    if (SKY_KEYS[i][KH] <= h && h < SKY_KEYS[i+1][KH]) { lo = SKY_KEYS[i]; hi = SKY_KEYS[i+1]; break; }
  }
  const t = (hi[KH] - lo[KH]) > 0 ? (h - lo[KH]) / (hi[KH] - lo[KH]) : 0;
  const s = t * t * (3 - 2 * t); // smooth-step
  const lf = (a, b) => a + (b - a) * s;
  const lc = (a, b) => new THREE.Color(a).lerp(new THREE.Color(b), s);
  return { lf, lc, lo, hi, s };
}

// Sun traces an arc across the sky: rises east at 6, zenith at 12, sets west at 18.
// Full orbit in 24 h so sun is below ground at night.
function getSunWorldPos(hour) {
  // angle completes one full circle over 24 h.
  // At h=6 angle=0 (east horizon), h=12 angle=π/2 (zenith), h=18 angle=π (west horizon).
  // X and Y are cos/sin of a full-circle angle → perfectly periodic, no midnight jump.
  const angle = (hour - 6) / 24 * Math.PI * 2;
  return new THREE.Vector3(
    Math.cos(angle) * 500,   // east(+) → west(-)
    Math.sin(angle) * 500,   // positive = above horizon
    0                        // no Z offset — any non-integer multiplier on angle
                             // breaks periodicity and causes a midnight jump
  );
}
function getMoonWorldPos(hour) { return getSunWorldPos(hour + 12); } // 12h opposite

// ============================================================
// SCENE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x66BBEE);
scene.fog = new THREE.FogExp2(0xC8C0A8, 0.00025);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 12000);
camera.position.set(0, PLAYER_HEIGHT, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ============================================================
// LIGHTING
// ============================================================
const ambient = new THREE.AmbientLight(0xFFFFEE, 0.7);
scene.add(ambient);

// Sun — directional, casts shadows, target follows player
const sun = new THREE.DirectionalLight(0xFFFFF0, 2.0);
sun.position.set(100, 500, 0);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -300; sun.shadow.camera.right = 300;
sun.shadow.camera.top = 300;  sun.shadow.camera.bottom = -300;
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 1200;
scene.add(sun);
scene.add(sun.target); // target updated each frame to follow player

// Moon — directional, casts soft blue shadows at night, target follows player
const moonDirLight = new THREE.DirectionalLight(0xBBCCEE, 0.0);
moonDirLight.position.set(-100, 500, 0);
moonDirLight.castShadow = true;
moonDirLight.shadow.mapSize.set(1024, 1024);
moonDirLight.shadow.camera.left = -300; moonDirLight.shadow.camera.right = 300;
moonDirLight.shadow.camera.top = 300;   moonDirLight.shadow.camera.bottom = -300;
moonDirLight.shadow.camera.near = 0.5;  moonDirLight.shadow.camera.far = 1200;
scene.add(moonDirLight);
scene.add(moonDirLight.target);

const hemi = new THREE.HemisphereLight(0x66BBEE, 0xC8A882, 0.5);
scene.add(hemi);

// ============================================================
// SKY DOME (follows camera)
// ============================================================
const skyGeo = new THREE.SphereGeometry(5500, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topColor: { value: new THREE.Color(0x2255AA) },
    midColor: { value: new THREE.Color(0x66BBEE) },
    bottomColor: { value: new THREE.Color(0xD8D0C0) },
    sunDirection: { value: new THREE.Vector3(0.2, 1.0, 0.1).normalize() },
    horizonNear: { value: new THREE.Color(0xD8D0C0) },
    horizonFar: { value: new THREE.Color(0xD8D0C0) },
    sunDiscColor: { value: new THREE.Color(0xFFFFF8) },
    sunDiscSize: { value: 0.03 },
    sunDiscIntensity: { value: 1.2 },
  },
  vertexShader: `
    varying vec3 vWorldDir;
    void main() {
      vWorldDir = normalize((modelMatrix * vec4(position, 1.0)).xyz - cameraPosition);
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform vec3 topColor, midColor, bottomColor, sunDirection, horizonNear, horizonFar, sunDiscColor;
    uniform float sunDiscSize, sunDiscIntensity;
    varying vec3 vWorldDir;
    void main() {
      vec3 dir = normalize(vWorldDir);
      float h = dir.y;
      vec3 col = mix(bottomColor, midColor, smoothstep(0.0, 0.15, h));
      col = mix(col, topColor, smoothstep(0.15, 0.7, h));
      float sunDot = dot(normalize(vec3(dir.x, 0.0, dir.z)), normalize(vec3(sunDirection.x, 0.0, sunDirection.z)));
      vec3 hCol = mix(horizonFar, horizonNear, smoothstep(-0.3, 1.0, sunDot));
      col = mix(col, hCol, smoothstep(0.15, 0.0, h) * smoothstep(-0.05, 0.02, h) * 0.8);
      float sAng = acos(clamp(dot(dir, sunDirection), -1.0, 1.0));
      col += sunDiscColor * exp(-sAng*sAng*8.0) * 0.4 * sunDiscIntensity;
      col = mix(col, sunDiscColor * sunDiscIntensity, smoothstep(sunDiscSize, sunDiscSize*0.5, sAng));
      gl_FragColor = vec4(col, 1.0);
    }`
});
const skyDome = new THREE.Mesh(skyGeo, skyMat);
scene.add(skyDome);

// ============================================================
// STARS (follow camera)
// ============================================================
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
  const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI * 0.48, r = 5200;
  starPos[i*3] = r*Math.sin(ph)*Math.cos(th);
  starPos[i*3+1] = r*Math.cos(ph);
  starPos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 2.5, transparent: true, opacity: 0, sizeAttenuation: false });
const starField = new THREE.Points(starGeo, starMat);
starField.renderOrder = 0; // stars draw first, moon draws on top
scene.add(starField);

// ============================================================
// SUN SPRITE — bright disc that rides the orbit arc
// ============================================================
(function buildSunSprite() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  // Outer glow
  const g = ctx.createRadialGradient(128,128,0, 128,128,128);
  g.addColorStop(0,   'rgba(255,255,220,1)');
  g.addColorStop(0.12,'rgba(255,240,160,1)');
  g.addColorStop(0.28,'rgba(255,200, 60,0.7)');
  g.addColorStop(0.55,'rgba(255,140, 10,0.25)');
  g.addColorStop(1,   'rgba(255,100,  0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  window._sunTex = new THREE.CanvasTexture(c);
})();
const sunSpriteMat = new THREE.SpriteMaterial({
  map: window._sunTex, transparent: true, depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const sunSprite = new THREE.Sprite(sunSpriteMat);
sunSprite.scale.set(500, 500, 1);
scene.add(sunSprite);

// ============================================================
// MOON SPRITE — full moon disc with craters
// ============================================================
(function buildMoonSprite() {
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  // Clip everything to a circle — guarantees no square border ever appears
  ctx.save();
  ctx.beginPath(); ctx.arc(128,128,122,0,Math.PI*2); ctx.clip();
  // Base disc — radial gradient fades to transparent at rim (no hard edge)
  const base = ctx.createRadialGradient(128,128,0, 128,128,122);
  base.addColorStop(0,    'rgba(245,242,225,1)');
  base.addColorStop(0.80, 'rgba(218,214,190,1)');
  base.addColorStop(0.94, 'rgba(195,190,165,0.6)');
  base.addColorStop(1.0,  'rgba(170,165,140,0)');
  ctx.fillStyle = base; ctx.fillRect(0,0,256,256);
  // Large maria (dark regions)
  ctx.globalAlpha = 0.18; ctx.fillStyle = '#707060';
  for (const [x,y,r] of [[110,90,38],[150,130,28],[90,145,22],[155,80,18]]) {
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  // Craters (lighter rims)
  ctx.globalAlpha = 0.25; ctx.fillStyle = '#E8E4CC';
  for (const [x,y,r] of [[85,80,14],[155,108,18],[95,145,11],[140,158,9],[170,82,7],[115,115,20]]) {
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore(); // remove clip
  window._moonTex = new THREE.CanvasTexture(c);
})();
const moonSpriteMat = new THREE.SpriteMaterial({
  map: window._moonTex, transparent: true, depthWrite: false, depthTest: false,
});
const moonSprite = new THREE.Sprite(moonSpriteMat);
moonSprite.scale.set(384, 384, 1); // 20% bigger than before
moonSprite.renderOrder = 2;        // draw after stars so moon is always in front
scene.add(moonSprite);

// White additive glow — makes moon look like a bright white ball when high in sky.
// Near horizon the glow fades and the texture sprite shows through (craters visible).
const moonGlowMat = new THREE.SpriteMaterial({
  color: 0xDDEEFF, transparent: true, opacity: 0,
  blending: THREE.AdditiveBlending, depthWrite: false, depthTest: false,
});
const moonGlowSprite = new THREE.Sprite(moonGlowMat);
moonGlowSprite.scale.set(500, 500, 1);
moonGlowSprite.renderOrder = 3; // draw after moon disc
scene.add(moonGlowSprite);

// ============================================================
// GROUND — single huge plane that follows the player.
// Because the texture uses RepeatWrapping and we offset the UVs by the
// player's world position, the ground appears to stay fixed in world space
// while the mesh itself stays centered on the camera.
// ============================================================
const groundCanvas = document.createElement('canvas');
groundCanvas.width = groundCanvas.height = 512;
const gCtx = groundCanvas.getContext('2d');
gCtx.fillStyle = '#C8A872';
gCtx.fillRect(0, 0, 512, 512);
for (let i = 0; i < 30000; i++) {
  const shade = 160 + Math.random() * 60;
  gCtx.fillStyle = `rgb(${shade},${shade*0.8},${shade*0.55})`;
  gCtx.fillRect(Math.random()*512, Math.random()*512, 1+Math.random()*2, 1+Math.random()*2);
}
const groundTex = new THREE.CanvasTexture(groundCanvas);
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
const GROUND_TILE = 20;   // world units per texture tile
const GROUND_PLANE_SIZE = 8000; // big enough to cover the view frustum
groundTex.repeat.set(GROUND_PLANE_SIZE / GROUND_TILE, GROUND_PLANE_SIZE / GROUND_TILE);
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(GROUND_PLANE_SIZE, GROUND_PLANE_SIZE),
  new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.95, metalness: 0, color: 0xD4B888 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============================================================
// MOUNTAINS (backdrop ring — parented to a group that follows the camera,
// so they stay far away in all directions and never become reachable)
// ============================================================
const mountainFollower = new THREE.Group();
scene.add(mountainFollower);
function createMountainRange(radius, count, minH, maxH, c1, c2) {
  for (let i = 0; i < count; i++) {
    const a = (i/count)*Math.PI*2+(Math.random()-0.5)*0.3;
    const d = radius+(Math.random()-0.5)*400;
    const h = minH+Math.random()*(maxH-minH);
    const bw = h*(1.5+Math.random()*1.8);
    const geo = new THREE.ConeGeometry(bw, h, 5+Math.floor(Math.random()*4), 1);
    const p = geo.attributes.position;
    for (let j = 0; j < p.count; j++) {
      if (p.getY(j) < h*0.49) { p.setX(j, p.getX(j)+(Math.random()-0.5)*bw*0.15); p.setZ(j, p.getZ(j)+(Math.random()-0.5)*bw*0.15); }
      p.setY(j, p.getY(j)+(Math.random()-0.5)*h*0.08);
    }
    geo.computeVertexNormals();
    const col = new THREE.Color(c1).lerp(new THREE.Color(c2), Math.random());
    const m = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: col, roughness: 0.9, flatShading: true }));
    m.position.set(Math.cos(a)*d, h*0.45, Math.sin(a)*d);
    m.rotation.y = Math.random()*Math.PI;
    mountainFollower.add(m);
  }
}
createMountainRange(5200, 35, 300, 700, 0x8B7355, 0x6B5B45);
createMountainRange(4600, 28, 200, 500, 0x9B8365, 0x7B6B55);
createMountainRange(4000, 18, 100, 300, 0xA08060, 0x907050);

// ============================================================
// WRAP-AWARE OBJECTS
// For each object with a fixed world position, every frame we compute its
// shortest wrapped delta from the player and set its mesh position to
// (player + delta). This gives seamless looping without ghost copies.
// ============================================================
const wrapObjects = []; // { x, z, mesh, visibleDist }

function addWrapObject(x, z, mesh, visibleDist = 3000) {
  scene.add(mesh);
  wrapObjects.push({ x, z, mesh, visibleDist });
}

// ============================================================
// BUILDINGS — four buildings per tile following the user's pattern.
// Normalized tile positions (0..1):
//   1 = (0.00, 0.00)  (tile corner; appears at all four corners by wrap)
//   2 = (0.50, 0.00)  (middle of bottom edge)
//   3 = (0.25, 0.50)  (halfway up, left-middle)
//   4 = (0.75, 0.50)  (halfway up, right-middle)
// World coords = normalized * WORLD_SIZE + tileOrigin.
// Here we center the tile on origin, so tileOrigin = (-HALF, -HALF).
// ============================================================
const buildingPositions = [
  { id: 1, nx: 0.00, nz: 0.00, color: 0xCC3322 },
  { id: 2, nx: 0.50, nz: 0.00, color: 0x2266CC },
  { id: 3, nx: 0.25, nz: 0.50, color: 0x44AA44 },
  { id: 4, nx: 0.75, nz: 0.50, color: 0xDDAA22 },
];

function makeBuilding(color) {
  const g = new THREE.Group();
  const wallMat = new THREE.MeshStandardMaterial({ color, roughness: 0.85 });
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x3A2A1A, roughness: 0.9 });
  const walls = new THREE.Mesh(new THREE.BoxGeometry(14, 12, 14), wallMat);
  walls.position.y = 6; walls.castShadow = true; walls.receiveShadow = true;
  const roof = new THREE.Mesh(new THREE.ConeGeometry(11, 6, 4), roofMat);
  roof.position.y = 15; roof.rotation.y = Math.PI / 4; roof.castShadow = true;
  const door = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.3), new THREE.MeshStandardMaterial({ color: 0x2A1A0A }));
  door.position.set(0, 2.5, 7.05);
  g.add(walls, roof, door);
  return g;
}

const buildingDots = [];
for (const b of buildingPositions) {
  const x = b.nx * WORLD_SIZE - HALF;
  const z = b.nz * WORLD_SIZE - HALF;
  const mesh = makeBuilding(b.color);
  addWrapObject(x, z, mesh, 3000);
  buildingDots.push({ x, z, id: b.id, color: b.color });
}

// ============================================================
// PLAYER STATE — plain 2D: x, z, yaw. That's it.
// ============================================================
const player = { x: 0, z: 100, yaw: 0 }; // start just south of the crossroads
let lookYaw = 0, lookPitch = 0;
const keys = {};
let locked = false;

// ============================================================
// CONTROLS
// ============================================================
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'BracketLeft')  { adjustTweak('turn', -1);
  } else if (e.code === 'BracketRight') { adjustTweak('turn', 1);
  } else if (e.code === 'Semicolon')    { adjustTweak('mouse', -1);
  } else if (e.code === 'Quote')        { adjustTweak('mouse', 1);
  } else if (e.code === 'Comma')        { adjustTweak('walk', -1);
  } else if (e.code === 'Period')       { adjustTweak('walk', 1);
  } else if (e.code === 'KeyK')         { adjustTweak('run', -1);
  } else if (e.code === 'KeyL')         { adjustTweak('run', 1);
  } else if (e.code === 'KeyN')         { adjustTweak('night', -1);
  } else if (e.code === 'KeyM')         { adjustTweak('night', 1);
  }
  if (locked) e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

function refreshTweaks() {
  document.getElementById('tv-turn').textContent = TURN_SPEED.toFixed(2);
  document.getElementById('tv-mouse').textContent = MOUSE_SENS.toFixed(4);
  document.getElementById('tv-walk').textContent = WALK_SPEED.toFixed(0);
  document.getElementById('tv-run').textContent = RUN_SPEED.toFixed(0);
  document.getElementById('tv-night').textContent = NIGHT_BRIGHT.toFixed(2);
}
function adjustTweak(kind, dir) {
  if (kind === 'turn')  TURN_SPEED  = Math.max(0.1, TURN_SPEED  + dir * 0.1);
  if (kind === 'mouse') MOUSE_SENS  = Math.max(0.0002, MOUSE_SENS + dir * 0.0002);
  if (kind === 'walk')  WALK_SPEED  = Math.max(1, WALK_SPEED + dir * 5);
  if (kind === 'run')   RUN_SPEED   = Math.max(1, RUN_SPEED  + dir * 5);
  if (kind === 'night') NIGHT_BRIGHT = Math.max(0, NIGHT_BRIGHT + dir * 0.1);
  refreshTweaks();
}
document.querySelectorAll('#tweaks button').forEach(b => {
  b.addEventListener('click', ev => {
    ev.stopPropagation();
    adjustTweak(b.dataset.tw, parseInt(b.dataset.d, 10));
  });
});
refreshTweaks();

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  document.getElementById('overlay').style.display = locked ? 'none' : 'flex';
  ['crosshair','hud','compass-wrap','minimap','clock'].forEach(id =>
    document.getElementById(id).style.display = locked ? 'block' : 'none'
  );
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  lookYaw += e.movementX * MOUSE_SENS;
  lookPitch -= e.movementY * MOUSE_SENS;
  lookPitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, lookPitch));
});

window.startGame = () => renderer.domElement.requestPointerLock();

// ============================================================
// CONTINUOUS TIME OF DAY — apply every frame
// ============================================================
function applyContinuousTime(dt) {
  const sunPos = getSunWorldPos(timeOfDay);
  const moonPos = getMoonWorldPos(timeOfDay);

  // Sun: fade in/out near horizon over ~15 units
  const sunFade = THREE.MathUtils.clamp(sunPos.y / 15, 0, 1);
  // Moon: same
  const moonFade = THREE.MathUtils.clamp(moonPos.y / 15, 0, 1);

  const { lf, lc, lo, hi } = lerpSkyState(timeOfDay);

  // Sky uniforms
  const sunDir = sunPos.clone().normalize();
  // When sun is below horizon we still want the horizon glow to track
  // where the sun just disappeared, so pass clamped-y direction.
  const horizDir = new THREE.Vector3(sunPos.x, Math.max(sunPos.y, -50), sunPos.z).normalize();
  skyMat.uniforms.topColor.value.copy(lc(lo[KST], hi[KST]));
  skyMat.uniforms.midColor.value.copy(lc(lo[KSM], hi[KSM]));
  skyMat.uniforms.bottomColor.value.copy(lc(lo[KSB], hi[KSB]));
  skyMat.uniforms.horizonNear.value.copy(lc(lo[KHN], hi[KHN]));
  skyMat.uniforms.horizonFar.value.copy(lc(lo[KHF], hi[KHF]));
  skyMat.uniforms.sunDirection.value.copy(horizDir);
  // Sun disc — bigger when near horizon (atmospheric magnification)
  const horizonBoost = 1 + Math.max(0, 1 - Math.abs(sunDir.y) * 5) * 0.8;
  skyMat.uniforms.sunDiscColor.value.copy(lc(lo[KDISC], hi[KDISC]));
  skyMat.uniforms.sunDiscSize.value = lf(lo[KDISCS], hi[KDISCS]) * horizonBoost;
  skyMat.uniforms.sunDiscIntensity.value = lf(lo[KDISCI], hi[KDISCI]) * sunFade;

  // Fog + background
  scene.fog.color.copy(lc(lo[KFOG], hi[KFOG]));
  scene.fog.density = lf(lo[KFOGD], hi[KFOGD]);
  scene.background.copy(lc(lo[KSM], hi[KSM]));

  // Sun directional light — shadows only when sun is meaningfully up
  sun.color.copy(lc(lo[KSUNC], hi[KSUNC]));
  sun.intensity = lf(lo[KSUNI], hi[KSUNI]) * sunFade;
  sun.position.copy(sunPos);
  sun.castShadow = sunFade > 0.20;

  // Ambient + hemi — NIGHT_BRIGHT adds directly on top of keyframe values at night.
  // nightFactor=1 at full night, 0 at full day — smooth blend at dusk/dawn.
  // Additive formula means 0.1 steps on the slider = noticeable change every time.
  const nightFactor = 1 - THREE.MathUtils.clamp(sunFade * 2, 0, 1);
  ambient.color.copy(lc(lo[KAMBC], hi[KAMBC]));
  ambient.intensity = lf(lo[KAMBI], hi[KAMBI]) + nightFactor * NIGHT_BRIGHT;
  hemi.color.copy(lc(lo[KHKC], hi[KHKC]));
  hemi.groundColor.copy(lc(lo[KHGC], hi[KHGC]));
  hemi.intensity = lf(lo[KHKI], hi[KHKI]) + nightFactor * NIGHT_BRIGHT * 0.6;

  // Exposure — also pushed up at night by NIGHT_BRIGHT so tone mapping amplifies moon/ambient
  renderer.toneMappingExposure = lf(lo[KEXPO], hi[KEXPO]) + nightFactor * NIGHT_BRIGHT * 0.5;

  // Stars
  starMat.opacity = lf(lo[KSTARS], hi[KSTARS]);

  // Sun sprite — sits at SKY_DIST in the sun direction from the camera
  const SKY_DIST = 4800;
  sunSprite.position.set(
    player.x + sunDir.x * SKY_DIST,
    sunDir.y * SKY_DIST,
    player.z + sunDir.z * SKY_DIST
  );
  // Color tint: warm orange at sunrise/set, white at noon
  const sunElevation = THREE.MathUtils.clamp(sunDir.y, 0, 1);
  sunSpriteMat.color.setHSL(0.08 - sunElevation * 0.08, 1 - sunElevation * 0.8, 1);
  sunSpriteMat.opacity = sunFade;
  // Scale up when near horizon (atmospheric magnification)
  const sunScale = 500 + (1 - sunElevation) * 300;
  sunSprite.scale.set(sunScale, sunScale, 1);

  // Moon sprite — always full moon, opposite side of sky
  const moonDir = moonPos.clone().normalize();
  moonSprite.position.set(
    player.x + moonDir.x * SKY_DIST,
    moonDir.y * SKY_DIST,
    player.z + moonDir.z * SKY_DIST
  );
  moonGlowSprite.position.copy(moonSprite.position);

  const moonVis = lf(lo[KMOON], hi[KMOON]) * moonFade;
  // Elevation 0=horizon, 1=zenith — drives white-ball vs texture balance
  const moonElev = THREE.MathUtils.clamp(moonPos.y / 400, 0, 1);
  // Texture sprite: always present but washed out when high (white ball).
  // Near horizon the glow backs off and craters become visible.
  moonSpriteMat.opacity = moonVis * (0.5 + (1 - moonElev) * 0.5);
  // Glow sprite: additive white — intense when high (ball), soft near horizon
  moonGlowMat.opacity = moonVis * (0.15 + moonElev * 0.75);

  // Moon directional light: cool blue, casts shadows at night
  moonDirLight.position.set(
    player.x + moonDir.x * 800,
    moonDir.y * 800,
    player.z + moonDir.z * 800
  );
  moonDirLight.intensity = moonVis * 1.2;
  moonDirLight.castShadow = moonVis > 0.15;

  // Clock display — 12h format
  const totalMin = Math.round(timeOfDay * 60) % (24 * 60);
  const hh = Math.floor(totalMin / 60), mm = totalMin % 60;
  const ampm = hh < 12 ? 'AM' : 'PM';
  const h12 = hh % 12 || 12;
  document.getElementById('clock').textContent =
    `${h12}:${String(mm).padStart(2,'0')} ${ampm}`;
}

// ============================================================
// MINIMAP — 2D square showing the wrap tile, roads, landmarks, player.
// ============================================================
const miniCanvas = document.getElementById('minimap-canvas');
const miniCtx = miniCanvas.getContext('2d');
function drawMinimap() {
  const W = miniCanvas.width, H = miniCanvas.height;
  miniCtx.clearRect(0, 0, W, H);
  // Background
  miniCtx.fillStyle = 'rgba(40, 30, 15, 0.85)';
  miniCtx.fillRect(0, 0, W, H);
  // World -> canvas: (x, z) in [-HALF, HALF] -> [0, W]
  const scale = W / WORLD_SIZE;
  const cx = (x) => (x + HALF) * scale;
  const cz = (z) => (z + HALF) * scale;
  // Repeat-box perimeter (the tile boundary)
  miniCtx.strokeStyle = 'rgba(232,213,176,0.45)';
  miniCtx.lineWidth = 1;
  miniCtx.strokeRect(cx(-HALF), cz(-HALF), W - 2, H - 2);
  // Buildings with labels
  miniCtx.font = 'bold 10px monospace';
  miniCtx.textAlign = 'center';
  miniCtx.textBaseline = 'middle';
  for (const b of buildingDots) {
    miniCtx.fillStyle = '#' + b.color.toString(16).padStart(6, '0');
    miniCtx.beginPath(); miniCtx.arc(cx(b.x), cz(b.z), 6, 0, Math.PI*2); miniCtx.fill();
    miniCtx.fillStyle = '#fff';
    miniCtx.fillText(String(b.id), cx(b.x), cz(b.z));
  }
  // Player — always centered in visible area is simpler, but showing the
  // real position on the tile is informative. Draw a red dot + heading triangle.
  const px = cx(player.x), pz = cz(player.z);
  miniCtx.save();
  miniCtx.translate(px, pz);
  miniCtx.rotate(player.yaw + lookYaw);
  miniCtx.fillStyle = 'rgba(255, 80, 60, 1)';
  miniCtx.beginPath();
  miniCtx.moveTo(0, -7); miniCtx.lineTo(5, 5); miniCtx.lineTo(-5, 5); miniCtx.closePath();
  miniCtx.fill();
  miniCtx.restore();
}

// ============================================================
// COMPASS
// ============================================================
const compassCtx = document.getElementById('compass-canvas').getContext('2d');
function drawCompass(northAngle) {
  const c = compassCtx;
  c.clearRect(0, 0, 100, 100);
  c.save(); c.translate(50, 50);
  c.rotate(northAngle);
  c.beginPath(); c.moveTo(0, -38); c.lineTo(-8, 5); c.lineTo(0, -2); c.lineTo(8, 5); c.closePath();
  c.fillStyle = 'rgba(220,50,30,0.7)'; c.fill();
  c.beginPath(); c.moveTo(0, 38); c.lineTo(-6, -2); c.lineTo(0, 5); c.lineTo(6, -2); c.closePath();
  c.fillStyle = 'rgba(200,190,170,0.4)'; c.fill();
  c.fillStyle = 'rgba(232,213,176,0.8)'; c.font = 'bold 14px Georgia'; c.textAlign = 'center';
  c.fillText('N', 0, -22);
  c.fillStyle = 'rgba(232,213,176,0.4)'; c.font = '11px Georgia';
  c.fillText('S', 0, 30); c.fillText('E', 30, 5); c.fillText('W', -30, 5);
  c.restore();
}

// ============================================================
// ANIMATION
// ============================================================
const clock = new THREE.Clock();
const euler = new THREE.Euler(0, 0, 0, 'YXZ');
const walkBob = { phase: 0 };

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.1);
  // Advance time of day — hold + to fast-forward, hold - to rewind, else normal pace
  if (keys['Equal'] || keys['NumpadAdd']) {
    timeOfDay = (timeOfDay + dt * TIME_SPEED * 60) % 24;
  } else if (keys['Minus'] || keys['NumpadSubtract']) {
    timeOfDay = (timeOfDay - dt * TIME_SPEED * 60 + 24) % 24;
  } else {
    timeOfDay = (timeOfDay + dt * TIME_SPEED) % 24;
  }
  applyContinuousTime(dt);

  if (locked) {
    const speed = keys['ShiftLeft'] || keys['ShiftRight'] ? RUN_SPEED : WALK_SPEED;

    // A/D: pure camera yaw, same as mouse
    if (keys['KeyA'] || keys['ArrowLeft'])  lookYaw -= TURN_SPEED * dt;
    if (keys['KeyD'] || keys['ArrowRight']) lookYaw += TURN_SPEED * dt;

    // W/S: walk in whichever direction the camera is facing.
    let moveAmount = 0;
    if (keys['KeyW'] || keys['ArrowUp']) moveAmount += 1;
    if (keys['KeyS'] || keys['ArrowDown']) moveAmount -= 1;
    if (moveAmount !== 0) {
      // Camera forward in world XZ: at lookYaw=0, forward is -Z.
      // (Three.js rotates forward (0,0,-1) by euler.y=-lookYaw → (sin yaw, 0, -cos yaw).)
      const fx = Math.sin(lookYaw);
      const fz = -Math.cos(lookYaw);
      const step = moveAmount * speed * dt;
      player.x += fx * step;
      player.z += fz * step;
      // Wrap to [-HALF, HALF)
      player.x = ((player.x + HALF) % WORLD_SIZE + WORLD_SIZE) % WORLD_SIZE - HALF;
      player.z = ((player.z + HALF) % WORLD_SIZE + WORLD_SIZE) % WORLD_SIZE - HALF;
      walkBob.phase += dt * (speed === RUN_SPEED ? 12 : 8);
    }
  }

  // Camera rides on the player's world position. Bob for walking feel.
  const bobY = PLAYER_HEIGHT + Math.sin(walkBob.phase) * 0.2;
  camera.position.set(player.x, bobY, player.z);
  euler.y = -lookYaw;
  euler.x = lookPitch;
  camera.quaternion.setFromEuler(euler);

  // Sky, stars, mountains all ride along with the camera.
  skyDome.position.set(player.x, 0, player.z);
  starField.position.set(player.x, 0, player.z);
  mountainFollower.position.set(player.x, 0, player.z);

  // Shadow targets follow the player so shadows render around the player's area.
  sun.target.position.set(player.x, 0, player.z);
  sun.target.updateMatrixWorld();
  moonDirLight.target.position.set(player.x, 0, player.z);
  moonDirLight.target.updateMatrixWorld();
  // Sun + moon sprites are positioned inside applyContinuousTime.

  // Ground: follow player in world space, offset UVs so the texture
  // appears nailed to the world.
  ground.position.set(player.x, 0, player.z);
  groundTex.offset.x = player.x / GROUND_TILE;
  groundTex.offset.y = -player.z / GROUND_TILE;

  // Wrap-aware objects: for each, place at player + shortestDelta(object, player).
  for (const o of wrapObjects) {
    const dx = wrapDelta(player.x, o.x);
    const dz = wrapDelta(player.z, o.z);
    const d2 = dx*dx + dz*dz;
    if (d2 > o.visibleDist * o.visibleDist) {
      o.mesh.visible = false;
      continue;
    }
    o.mesh.visible = true;
    o.mesh.position.x = player.x + dx;
    o.mesh.position.z = player.z + dz;
  }

  // (no windmill in env version)

  // Compass: show which way is world +Z (= "north" by convention).
  // Camera forward yaw relative to -Z is `-lookYaw`, so north angle in
  // screen-compass terms is `lookYaw + π`.
  drawCompass(lookYaw + Math.PI);

  // HUD: x, z coordinates (as integers for readability)
  document.getElementById('hud-text').textContent =
    `X ${player.x.toFixed(0)}  Z ${player.z.toFixed(0)}`;

  drawMinimap();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
